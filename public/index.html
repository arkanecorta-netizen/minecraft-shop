<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Minecraft</title>
</head>
<body>

<h1>Tienda Minecraft</h1>

<button onclick="comprar()">
Comprar VIP - $1000
</button>

<script>
async function comprar() {
  const res = await fetch("/crear-pago", {
    method: "POST"
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = data.url;
  } else {
    alert("Error al crear el pago");
  }
}
</script>

</body>
</html>
